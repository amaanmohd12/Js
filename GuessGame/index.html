<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="wrapper">

        <h1>🎯 Number Guessing Game</h1>

        <p>I'm thinking of a number between <strong>1</strong> and <strong>100</strong>.</p>

        <p>You have <strong>10 chances</strong> to guess it correctly.</p>

        <form class="form">

            <label for="guessField" id="guess">
                Guess a Number
            </label>

            <input
                type="number"
                id="guessField"
                class="guessField"
                min="1"
                max="100"
                placeholder="Enter your guess"
                required
            >

            <input
                type="submit"
                id="subt"
                class="guessSubmit"
                value="Submit Guess"
            >

        </form>

        <div class="resultParas">

            <p>
                Previous Guesses:
                <span class="guesses"></span>
            </p>

            <p>
                Guesses Remaining:
                <span class="lastResult">10</span>
            </p>

            <p class="lowOrHi"></p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
